[common]
media_mode = "record_1080p_new"

; vb pool config
[vb_config]
vbpool_cnt = 2

[vbpool0]
enable          = 1
frame_width     = 1920
frame_height    = 1080
frame_fmt       = 18 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 4

[vbpool1]
enable          = 1
frame_width     = 480
frame_height    = 640
frame_fmt       = 18 ; 12: yuv422  13: yuv420 19:NV21
blk_cnt         = 12

; sensor
[sensor_config0]
enable  = 1
id      = 0
wdrmode = 0 ;0:linear, 3:wdr 2to1
sensortype = 0x48583440 ; new sensor (record_1080p_new)；旧 1080p60 配置为 0x48583C20
i2cid   = 1
i2caddr = 0x31 ; // 十进制、十六进制
mclk_en = 1
cam_clk_id = 0; 0:clk0, 1:clk1
rst_gpio_inx = 1; 0: group A, 1: group B ...
rst_gpio_pin = 26; 0: PIN 0, 1: PIN 1, 2: PIN 2....
rst_gpio_pol = 0; 1: OF_GPIO_ACTIVE_LOW, 2: OF_GPIO_SINGLE_ENDED, 4: OF_GPIO_OPEN_DRAIN
                ; 8: OF_GPIO_TRANSITORY, 16: OF_GPIO_PULL_UP, 32: OF_GPIO_PULL_DOWN
hwsync  = 0
mipidev = 0
laneid0 = 2
laneid1 = 0
laneid2 = 3
laneid3 = 1
laneid4 = 4
swap0   = 0
swap1   = 0
swap2   = 0
swap3   = 0
swap4   = 0
apipe0            = 0
apipe1            = -1
lane_switch_pin = 0
lane_switch_pin_pol = 0

; vcap
[vcap_config0]
enable  = 1
id      = 0
width   = 1920
height  = 1080
fmt     = 18 ; //12 yuv422 //13 yuv420; //19 nv21;
cpress  = 1 ;NONE : 0 TILE : 1,LINE:2, FRAME:3
mirror  = 0
filp    = 0
fps     = 60 ; // vi fps setting, support float

; vproc
[vproc_config]
vproc_cnt = 2

[vproc0]
grp_id      = 0
grp_enable      = 1
vpss_dev          = 1
width   = 1920
height  = 1080
fmt     = 18 ; //12 yuv422 //13 yuv420;
srcfps  = -1
dstfps  = -1
bind_enable       = 1;是否绑定
src_mod_id        = 14
                  ; 6:CVI_ID_VPSS
                  ; 7:CVI_ID_VENC
                  ; 14:CVI_ID_VI
src_dev_id        = 0
src_chn_id        = 0
dst_mod_id        = 6
                  ; CVI_ID_VPSS
                  ; CVI_ID_VENC
                  ; CVI_ID_VI
dst_dev_id        = 0
dst_chn_id        = 0
chn_num = 3

[vproc0_chn0]
chn_id      = 0
chn_enable  = 0
chn_width   = 1920
chn_height  = 1080
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 18; //12 yuv422 //13 yuv420 //19 nv21;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0
aspect_ratio_mode = 0 ; 0:none 1:auto 2:manual
aspect_ratio_rect_x = 0
aspect_ratio_rect_y = 0
aspect_ratio_rect_w = 0
aspect_ratio_rect_h = 0
aspect_ratio_bg_color_en = 0
aspect_ratio_bg_color = 0x000000;R << 16 | G << 8 | B
sbm_enable = 1; slice buffer mode 0:disable 1:enable
sbm_buf_line = 64; line num per buffer
sbm_buf_num = 5; buffer num

[vproc0_chn1]
chn_id      = 1
chn_enable  = 1
chn_width   = 640
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 18; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0
aspect_ratio_mode = 1 ; 0:none 1:auto 2:manual
aspect_ratio_rect_x = 0
aspect_ratio_rect_y = 0
aspect_ratio_rect_w = 0
aspect_ratio_rect_h = 0
aspect_ratio_bg_color_en = 0
aspect_ratio_bg_color = 0x000000;R << 16 | G << 8 | B

[vproc0_chn2]
chn_id      = 2
chn_enable  = 1
chn_width   = 200
chn_height  = 140
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 18; //12 yuv422 //13 yuv420;
chn_depth   = 0
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0
aspect_ratio_mode = 0 ; 0:none 1:auto 2:manual
aspect_ratio_rect_x = 0
aspect_ratio_rect_y = 0
aspect_ratio_rect_w = 0
aspect_ratio_rect_h = 0
aspect_ratio_bg_color_en = 0
aspect_ratio_bg_color = 0x000000;R << 16 | G << 8 | B

[vproc1]
grp_id      = 1
grp_enable      = 1
vpss_dev          = 0
width   = 640
height  = 480
fmt     = 18 ; //12 yuv422 //13 yuv420;
srcfps  = -1
dstfps  = -1
bind_enable       = 1;是否绑定
src_mod_id        = 6
                  ; 6:CVI_ID_VPSS
                  ; 7:CVI_ID_VENC
                  ; 14:CVI_ID_VI
src_dev_id        = 0
src_chn_id        = 1
dst_mod_id        = 6
                  ; CVI_ID_VPSS
                  ; CVI_ID_VENC
                  ; CVI_ID_VI
dst_dev_id        = 1
dst_chn_id        = 0
chn_num = 1

[vproc1_chn0]
chn_id      = 0
chn_enable  = 1
chn_width   = 640
chn_height  = 480
chn_vfmt    = 0 ;// 0 linear
chn_fmt     = 18; //12 yuv422 //13 yuv420;
chn_depth   = 1
chn_srcfps  = -1
chn_dstfps  = -1
chn_mirror  = 0
chn_filp    = 0
aspect_ratio_mode = 1 ; 0:none 1:auto 2:manual
aspect_ratio_rect_x = 0
aspect_ratio_rect_y = 0
aspect_ratio_rect_w = 0
aspect_ratio_rect_h = 0
aspect_ratio_bg_color_en = 1
aspect_ratio_bg_color = 0x000000;R << 16 | G << 8 | B

; venc
[venc_config]
chn_num = 3

[venc_chn0]
enable      = 1
id          = 0
sbm_enable = 1; slice buffer mode 0:disable 1:enable
bind_vproc_id       = 0
bind_vproc_chn_id   = 0
venc_bind_mode = 1
width       = 1920
height      = 1080
codec       = 1 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 18; //12 yuv422 //13 yuv420;
gop         = 50
profile     = 2
fps         = 60; // support float
rate_ctrl_mode  = 2 ; 0: CBR 1:VBR 2:AVBR 3:QVBR 4:FIXQP 5:QPMAP
bit_rate    = 8000;kbps
iqp         = 36
pqp         = 38
min_iqp     = 28
max_iqp     = 46
min_qp      = 28
max_qp      = 46
bufSize     = 2074800
datafifoLen = 11
initialdelay = 1000
thrdlv = 3
stattime = 2
firstFrameStartQp = 36
maxBitRate = 8000
gop_mode = 0
minIprop = 50
maxIprop = 100
minStillPercent = 10
maxStillQP = 38
avbrPureStillThr = 50
motionSensitivity = 24
bgDeltaQp = 0
rowQpDelta = 1
change_pos = 90
ipqpDelta = 2
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1

[venc_chn1]
enable      = 1
id          = 1
bind_vproc_id       = 0
bind_vproc_chn_id   = 1
width       = 640
height      = 480
codec       = 0 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 18; //12 yuv422 //13 yuv420;
gop         = 50
profile     = 2
fps         = 60; // support float
rate_ctrl_mode  = 2 ; 0: CBR 1:VBR 2:AVBR 3:QVBR 4:FIXQP 5:QPMAP
bit_rate    = 1500 ;kbps
iqp         = 32
pqp         = 32
min_iqp     = 18
max_iqp     = 44
min_qp      = 20
max_qp      = 50
bufSize     = 262144
datafifoLen = 11
initialdelay = 1000
thrdlv = 2
stattime = 2
firstFrameStartQp = 36
maxBitRate = 1500
gop_mode = 0
minIprop = 50
maxIprop = 100
minStillPercent = 10
maxStillQP = 38
avbrPureStillThr = 50
motionSensitivity = 24
bgDeltaQp = 0
rowQpDelta = 1
change_pos = 90
ipqpDelta = 2
videoSignalType_Flag = 1
video_Format = 5
videoFull_Flag = 1

[venc_chn2]
enable      = 1
id          = 2
bind_vproc_id       = 0
bind_vproc_chn_id   = 2
width       = 200
height      = 140
codec       = 2 ; 0:h264  1:h265 2:jpeg 3:mjpeg
pixel_fmt   = 18; //12 yuv422 //13 yuv420;
single_EsBuf= 1
jpeg_quality = 80
bufSize     = 65536; 64KiB

; osd config
[osd_config]
osd_cnt     = 2
osdc_enable = 0

[osd_content0]
type        = 0 ;//0: time 1:customeer string 2:bmp  3:circle
color       = 65535 ;//argb1555 0xffff
time_fmt    = 0 ;//yyyy-mm-dd
width       = 24
height      = 30
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content0.osd_display0]
enable      = 1
rgn_type    = 1;// 0:RGN_CMPR_RECT ; 1:RGN_CMPR_BIT_MAP;2:RGN_CMPR_LINE
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 0 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 0 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 1
start_y     = 95
batch       = 0 ;//0 camid = 0, 1 camid = 1

[osd_content1]
type        = 4 ;//0: time 1:custom string 2:bmp 3:circle 4:object
color       = 65535 ;//argb1555 0xffff
time_fmt    = 0 ;//yyyy-mm-dd
width       = 640
height      = 480
bg_color    = 32767 ; argb1555 0x7fff
display_num = 1

[osd_content1.osd_display0]
enable      = 1
rgn_type    = 0;// 0:RGN_CMPR_RECT ; 1:RGN_CMPR_BIT_MAP;2:RGN_CMPR_LINE
bind_mode   = 0 ;//0 - vproc mode 1 - disp mode
mod_hdl     = 1 ;//vproc id
chn_hdl     = 0 ;//vproc chnid
coordinate  = 1 ;//0 - RATIO_COOR  1 - ABS_COOR
start_x     = 0
start_y     = 0
batch       = 0 ;//0 camid = 0, 1 camid = 1